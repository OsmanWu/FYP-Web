<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 100%;
            margin: 20px auto;
            padding: 20px;
        }
        
        .dashboard-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            min-height: 600px;
        }
        
        iframe {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Dashboards</h1>
    </div>
    
    <div class="container">
        <div class="dashboard-wrapper">
            <iframe 
                src="https://app.powerbi.com/reportEmbed?reportId=b6e05a4a-620b-4043-b4ff-923437b18d87&autoAuth=true&ctid=f688b0d0-79f0-40a4-8644-35fcdee9d0f3"
                allowFullScreen="true"
                title="Power BI Dashboard">
            </iframe>
        </div>
    </div>
</body>
</html>
